<!DOCTYPE html>
<html>

<head>

    <title>DigiSapiens Avatar</title>

    <style>

        body{
            margin:0;
            background:#0f1117;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            overflow:hidden;
            font-family:sans-serif;
        }

        #avatar-container{
            position:relative;
            width:512px;
            height:512px;

            /* animation:
                float 4s ease-in-out infinite; */
        }

        .layer{
            position:absolute;
            width:100%;
            height:100%;
            object-fit:contain;
            user-select:none;
            pointer-events:none;
        }

        #face{
            transition:
                opacity 80ms linear,
                transform 120ms ease;
        }

        @keyframes float{

            0%{
                transform:
                    translateY(0px)
                    rotate(0deg);
            }

            50%{
                transform:
                    translateY(-2px)
                    rotate(0.2deg);
            }

            100%{
                transform:
                    translateY(0px)
                    rotate(0deg);
            }
        }

    </style>

</head>

<body>

<div id="avatar-container">

    <img
        class="layer"
        src="./assets/base.png"
    >

    <img
        class="layer"
        id="face"
        src="./assets/face_idle.png"
    >

</div>

<script>

const face =
    document.getElementById("face")


const faces = {

    idle:
        "./assets/face_idle.png",

    blink:
        "./assets/face_blink.png",

    small:
        "./assets/face_talk_small.png",

    medium:
        "./assets/face_talk_medium.png",

    large:
        "./assets/face_talk_large.png"
}


let talking = false


function setFace(state){

    face.src = faces[state]
}


/*
    BLINK SYSTEM
*/

function blinkLoop(){

    const nextBlink =
        2000 + Math.random() * 4000

    setTimeout(()=>{

        if(!talking){

            setFace("blink")

            setTimeout(()=>{

                setFace("idle")

            },120)
        }

        blinkLoop()

    },nextBlink)
}


/*
    TALKING SIMULATION
*/

async function fakeConversation(){

    talking = true

    const duration =
        4000 + Math.random() * 3000

    const start =
        Date.now()

    while(
        Date.now() - start < duration
    ){

        const r = Math.random()

        if(r < 0.33){

            setFace("small")

        }else if(r < 0.66){

            setFace("medium")

        }else{

            setFace("large")
        }

        await sleep(
            80 + Math.random() * 120
        )
    }

    talking = false

    setFace("idle")
}


/*
    HELPER
*/

function sleep(ms){

    return new Promise(
        r => setTimeout(r,ms)
    )
}


/*
    AUTO DEMO LOOP
*/

async function demoLoop(){

    while(true){

        await sleep(
            3000 + Math.random() * 3000
        )

        await fakeConversation()
    }
}


blinkLoop()

demoLoop()

</script>

</body>

</html>
