<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DigiSapiens-vad</title>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/ort.wasm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.29/dist/bundle.min.js"></script>

<link rel="icon" href="./assets/favicon.ico">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
background:#080b10;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:system-ui;
overflow:hidden;
color:#fff
}

.wrap{
display:flex;
flex-direction:column;
align-items:center;
gap:24px
}

.avatar{
width:280px;
height:280px;
border-radius:50%;
overflow:hidden;
position:relative;
background:#111827;
border:2px solid #1f2937
}

.avatar img{
position:absolute;
inset:0;
width:100%;
height:100%;
object-fit:cover
}

.ring{
position:absolute;
inset:-4px;
border-radius:50%;
border:3px solid transparent
}

.listen{
border-color:#38bdf8;
box-shadow:0 0 24px rgba(56,189,248,.5);
animation:spin 3s linear infinite
}

.speak{
border-color:#8b5cf6;
box-shadow:0 0 24px rgba(139,92,246,.5);
animation:spin 1s linear infinite
}

@keyframes spin{
from{transform:rotate(0)}
to{transform:rotate(360deg)}
}

button{
width:84px;
height:84px;
border:none;
border-radius:50%;
background:#111827;
color:#fff;
font-size:30px;
cursor:pointer
}

button.active{
background:#0ea5e9
}

.status{
opacity:.8
}
</style>
</head>

<body>

<div class="wrap">

<div class="avatar">

<div class="ring" id="ring"></div>

<img src="./assets/base.png">

<img
id="face"
src="./assets/face_idle.png"
>

</div>

<button id="btn">
🔵
</button>

<div class="status" id="status">
idle
</div>

</div>

<script>

const WS="ws://127.0.0.1:9000/ws"

const btn=document.getElementById("btn")
const ring=document.getElementById("ring")
const face=document.getElementById("face")
const statusEl=document.getElementById("status")

const FACES={
idle:"./assets/face_idle.png",
blink:"./assets/face_blink.png",
small:"./assets/face_talk_small.png",
medium:"./assets/face_talk_medium.png",
large:"./assets/face_talk_large.png"
}

let ws
let running=false
let myvad

let aiSpeaking=false
let ignoreSpeech=false

let isBlinking=false

function triggerBlink(){
isBlinking=true
setTimeout(()=>{
isBlinking=false
setTimeout(triggerBlink,3000+Math.random()*3000)
},150)
}
setTimeout(triggerBlink,3000)

let playCtx=new AudioContext({
sampleRate:24000
})

let analyser=playCtx.createAnalyser()

analyser.fftSize=256

analyser.connect(
playCtx.destination
)

let td=new Uint8Array(
analyser.fftSize
)

let nextPlay=0

let active=[]

function status(t){

statusEl.textContent=t
}

function connect(){

ws=new WebSocket(WS)

ws.binaryType="arraybuffer"

ws.onopen=()=>{

console.log("[ws] connected")

status("connected")
}

ws.onmessage=({data})=>{

if(data instanceof ArrayBuffer){

aiSpeaking=true

ignoreSpeech=true

play(data)

ring.classList.remove(
"listen"
)

ring.classList.add(
"speak"
)

status("speaking")

return
}

if(data==="__thinking__"){

status("thinking")

ring.classList.remove(
"speak"
)

return
}

if(data==="__done__"){

aiSpeaking=false

ignoreSpeech=false

status("idle")

ring.classList.remove(
"speak"
)

return
}

if(data==="__interrupted__"){

aiSpeaking=false

ignoreSpeech=false

status("idle")
}
}

ws.onclose=()=>{

console.log("[ws] reconnecting")

status("reconnecting")

setTimeout(
connect,
2000
)
}

ws.onerror=e=>{

console.error("[ws]",e)
}
}

function stopAudio(){

for(const s of active){

try{s.stop()}catch{}
}

active=[]

nextPlay=0

aiSpeaking=false

ignoreSpeech=false
}

function play(buf){

const pcm=new Int16Array(buf)

const f32=new Float32Array(
pcm.length
)

for(let i=0;i<pcm.length;i++)
f32[i]=pcm[i]/32768

const audioBuf=playCtx.createBuffer(
1,
f32.length,
24000
)

audioBuf.copyToChannel(
f32,
0
)

const src=playCtx.createBufferSource()

src.buffer=audioBuf

src.connect(analyser)

const start=Math.max(
playCtx.currentTime+.02,
nextPlay
)

src.start(start)

nextPlay=start+audioBuf.duration

active.push(src)

src.onended=()=>{

active=active.filter(
x=>x!==src
)

if(active.length===0){

aiSpeaking=false

ignoreSpeech=false
}
}
}

function f32ToPCM(float32){

const pcm=new Int16Array(
float32.length
)

for(let i=0;i<float32.length;i++){

let s=Math.max(
-1,
Math.min(1,float32[i])
)

pcm[i]=s<0
?s*0x8000
:s*0x7fff
}

return pcm.buffer
}

async function start(){

if(running)
return

running=true

if(
!ws||
ws.readyState!==1
){
connect()
}

await playCtx.resume()

console.log("[vad] loading...")

myvad=await vad.MicVAD.new({

onnxWASMBasePath:
"https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/",

baseAssetPath:
"https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.29/dist/",

positiveSpeechThreshold:.95,

negativeSpeechThreshold:.82,

minSpeechFrames:12,

preSpeechPadFrames:6,

redemptionFrames:16,

getStream:async()=>{

return navigator.mediaDevices.getUserMedia({

audio:{

channelCount:1,

echoCancellation:true,

noiseSuppression:true,

autoGainControl:true
}
})
},

onSpeechStart:()=>{

if(ignoreSpeech){

console.log(
"[vad] ignored speech during ai response"
)

return
}

console.log("[vad] speech start")

status("listening")

ring.classList.remove(
"speak"
)

ring.classList.add(
"listen"
)
},

onSpeechEnd:(audio)=>{

if(ignoreSpeech){

console.log(
"[vad] ignored completed speech"
)

return
}

console.log(
"[vad] speech end",
audio.length
)

let sum=0

for(let i=0;i<audio.length;i++)
sum+=audio[i]*audio[i]

const rms=Math.sqrt(
sum/audio.length
)

console.log(
"[vad] rms",
rms
)

if(rms<0.02){

console.log(
"[vad] weak speech ignored"
)

status("idle")

ring.classList.remove(
"listen"
)

return
}

status("thinking")

ring.classList.remove(
"listen"
)

const pcm=f32ToPCM(audio)

if(
ws &&
ws.readyState===1
){

ws.send(pcm)
}
},

onVADMisfire:()=>{

if(ignoreSpeech)
return

console.log("[vad] misfire")

status("idle")

ring.classList.remove(
"listen"
)
}
})

await myvad.start()

console.log("[vad] ready")

btn.classList.add(
"active"
)

status("idle")
}

async function stop(){

running=false

stopAudio()

if(myvad){

await myvad.pause()

myvad.destroy()

myvad=null
}

btn.classList.remove(
"active"
)

ring.classList.remove(
"listen",
"speak"
)

status("stopped")
}

function mouth(){

analyser.getByteTimeDomainData(
td
)

let ss=0

for(let i=0;i<td.length;i++){

const v=(td[i]-128)/128

ss+=v*v
}

const rms=Math.sqrt(
ss/td.length
)*40

let f="idle"

if(rms>2){
if(rms<6) f="small"
else if(rms<10) f="medium"
else f="large"
} else if(isBlinking) {
f="blink"
}

if(face.src!==FACES[f])
face.src=FACES[f]

requestAnimationFrame(
mouth
)
}

btn.onclick=()=>{

if(running)
stop()
else
start()
}

connect()

mouth()

</script>

</body>
</html>
