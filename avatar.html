<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<title>DigiSapiens</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#0f0f11;
    color:#e8e8e8;

    font-family:monospace;

    height:100vh;

    display:flex;
    flex-direction:column;

    align-items:center;
    justify-content:center;

    gap:24px;

    overflow:hidden;
}

h1{

    font-size:1.2rem;

    letter-spacing:.2em;

    color:#888;
}

/*
    AVATAR
*/

#avatar-container{

    position:relative;

    width:340px;
    height:340px;

    flex-shrink:0;
}

.layer{

    position:absolute;

    width:100%;
    height:100%;

    object-fit:contain;

    user-select:none;

    pointer-events:none;
}

#face{

    transition:
        opacity 70ms linear,
}

/*
    BUTTON
*/

#record{

    width:100px;
    height:100px;

    border-radius:50%;

    border:2px solid #444;

    background:#1a1a1e;

    color:white;

    font-size:.8rem;

    cursor:pointer;

    transition:.2s;

    flex-shrink:0;
}

#record.recording{

    border-color:#ff5555;

    box-shadow:
        0 0 30px
        rgba(255,80,80,.35);

    background:#2a1a1a;
}

#status{

    color:#666;
    min-height:1.2rem;
}

#latency{

    color:#777;
    font-size:.85rem;

    text-align:center;
}

</style>

</head>

<body>

<h1>DigiSapiens</h1>

<!--
    AVATAR
-->

<div id="avatar-container">

    <img
        class="layer"
        src="./assets/base.png"
    >

    <img
        class="layer"
        id="face"
        src="./assets/face_idle.png"
    >

</div>

<!--
    BUTTON
-->

<button id="record">
    Hold To Talk
</button>

<div id="status">
    ready
</div>

<div id="latency"></div>

<script>

const SERVER =
    "http://127.0.0.1:9000"

/*
    DOM
*/

const btn =
    document.getElementById("record")

const statusEl =
    document.getElementById("status")

const latencyEl =
    document.getElementById("latency")

const face =
    document.getElementById("face")

/*
    FACE STATES
*/

const faces = {

    idle:
        "./assets/base.png",

    blink:
        "./assets/face_blink.png",

    small:
        "./assets/face_talk_small.png",

    medium:
        "./assets/face_talk_medium.png",

    large:
        "./assets/face_talk_large.png"
}

function setFace(state){

    if(face.dataset.state === state)
        return

    face.dataset.state = state

    face.src = faces[state]
}

/*
    AUDIO
*/

let mediaRecorder

let chunks = []

let playbackCtx =
    new AudioContext()

let nextPlayAt = 0

/*
    ANALYSER
*/

const analyser =
    playbackCtx.createAnalyser()

analyser.fftSize = 256

const timeData =
    new Uint8Array(
        analyser.fftSize
    )

let smoothVolume = 0

/*
    STATUS
*/

function setStatus(t){

    statusEl.innerText = t
}

function resetPlayback(){

    nextPlayAt = 0
}

/*
    BLINKING
*/

function blinkLoop(){

    const nextBlink =
        2000 + Math.random() * 4000

    setTimeout(()=>{

        const current =
            face.dataset.state || "idle"

        setFace("blink")

        setTimeout(()=>{

            setFace(current)

        },120)

        blinkLoop()

    },nextBlink)
}

/*
    FACE ANIMATION
*/

let currentFace = "idle"

function animateFace(){

    analyser.getByteTimeDomainData(
        timeData
    )

    let sumSquares = 0

    for(
        let i=0;
        i<timeData.length;
        i++
    ){

        const v =
            (timeData[i] - 128)
            / 128

        sumSquares += v * v
    }

    /*
        RMS loudness
    */

    const rms = Math.sqrt(
        sumSquares
        / timeData.length
    )


    /*
        lower multiplier
        because TTS audio is loud
    */

    const volume =
        rms * 45

    /*
        smoothing
    */

    smoothVolume =
        smoothVolume * 0.88 +
        volume * 0.12

    /*
        decide mouth state
    */

    let nextFace = "idle"

    if(smoothVolume < 1.2){

        nextFace = "idle"

    }else if(smoothVolume < 4.5){

        nextFace = "small"

    }else if(smoothVolume < 9){

        nextFace = "medium"

    }else{

        nextFace = "large"
    }
    /*
        prevent flicker
    */

    if(nextFace !== currentFace){

        currentFace = nextFace

        setFace(nextFace)
    }

    requestAnimationFrame(
        animateFace
    )
}


/*
    MIC
*/

async function initMic(){

    const stream =

        await navigator
        .mediaDevices
        .getUserMedia({

            audio:{

                channelCount:1,

                echoCancellation:true,

                noiseSuppression:true,

                autoGainControl:true
            }
        })

    mediaRecorder =
        new MediaRecorder(

            stream,

            {
                mimeType:
                    "audio/webm;codecs=opus"
            }
        )

    mediaRecorder.ondataavailable =
        e => chunks.push(e.data)

    mediaRecorder.onstop =
        processRecording
}

/*
    RECORDING
*/

async function processRecording(){

    try{

        setStatus("thinking...")

        latencyEl.innerHTML = ""

        resetPlayback()

        const blob =

            new Blob(

                chunks,

                {
                    type:
                    "audio/webm;codecs=opus"
                }
            )

        chunks = []

        const formData =
            new FormData()

        formData.append(

            "file",

            blob,

            "audio.webm"
        )

        const responsePromise =

            fetch(

                `${SERVER}/voice`,

                {
                    method:"POST",
                    body:formData
                }
            )

        const uploadFinishedAt =
            performance.now()

        const response =
            await responsePromise

        if(!response.ok){

            setStatus("pipeline error")
            return
        }

        const llmLatency =

            response.headers.get(
                "X-LLM-Latency"
            ) || "?"

        const reader =
            response.body.getReader()

        let buffer =
            new Uint8Array()

        let firstAudio = true

        setStatus("speaking...")

        while(true){

            const {done,value} =
                await reader.read()

            if(done)
                break

            if(!value)
                continue

            if(firstAudio){

                firstAudio = false

                const latency =

                    performance.now()
                    - uploadFinishedAt

                latencyEl.innerHTML = `

                    upload → first audio:
                    ${Math.round(latency)} ms

                    <br>

                    llm:
                    ${llmLatency} ms
                `
            }

            const merged =

                new Uint8Array(

                    buffer.length
                    + value.length
                )

            merged.set(buffer)

            merged.set(
                value,
                buffer.length
            )

            buffer = merged

            while(true){

                if(buffer.length < 12)
                    break

                let riffIndex = -1

                for(

                    let i=0;
                    i<buffer.length-4;
                    i++

                ){

                    if(

                        buffer[i]===82 &&
                        buffer[i+1]===73 &&
                        buffer[i+2]===70 &&
                        buffer[i+3]===70

                    ){

                        riffIndex = i
                        break
                    }
                }

                if(riffIndex === -1){

                    buffer =
                        new Uint8Array()

                    break
                }

                if(riffIndex > 0){

                    buffer =
                        buffer.slice(riffIndex)
                }

                if(buffer.length < 8)
                    break

                const wavSize =

                    buffer[4]
                    |
                    (buffer[5]<<8)
                    |
                    (buffer[6]<<16)
                    |
                    (buffer[7]<<24)

                const totalSize =
                    wavSize + 8

                if(
                    buffer.length
                    < totalSize
                ) break

                const wavFragment =

                    buffer.slice(
                        0,
                        totalSize
                    )

                buffer =
                    buffer.slice(totalSize)

                await playWavFragment(
                    wavFragment
                )
            }
        }

        setStatus("ready")

    }catch(err){

        console.error(err)

        setStatus("error")
    }
}

/*
    PLAY AUDIO
*/

async function playWavFragment(
    wavBytes
){

    const arrayBuffer =

        wavBytes.buffer.slice(

            wavBytes.byteOffset,

            wavBytes.byteOffset
            + wavBytes.byteLength
        )

    const audioBuffer =

        await playbackCtx
        .decodeAudioData(
            arrayBuffer
        )

    const src =
        playbackCtx
        .createBufferSource()

    src.buffer =
        audioBuffer

    /*
        connect:
        source
        -> analyser
        -> speakers
    */

    src.connect(analyser)

    analyser.connect(
        playbackCtx.destination
    )

    const minStart =

        playbackCtx.currentTime
        + 0.05

    const startAt =

        Math.max(
            minStart,
            nextPlayAt
        )

    src.start(startAt)

    nextPlayAt =
        startAt
        + audioBuffer.duration
}

/*
    BUTTON EVENTS
*/

btn.onmousedown = ()=>{

    chunks = []

    btn.classList.add(
        "recording"
    )

    mediaRecorder.start()

    setStatus("recording...")
}

btn.onmouseup = ()=>{

    btn.classList.remove(
        "recording"
    )

    mediaRecorder.stop()
}

btn.ontouchstart = e=>{

    e.preventDefault()

    btn.onmousedown()
}

btn.ontouchend = e=>{

    e.preventDefault()

    btn.onmouseup()
}

/*
    START
*/

setFace("idle")

blinkLoop()

animateFace()

initMic()

</script>

</body>

</html>
