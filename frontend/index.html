<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DigiSapiens Voice Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      background: #0f0f11;
      color: #e8e8e8;
      font-family: 'Courier New', monospace;
    }
    h1 { font-size: 1.4rem; letter-spacing: 0.3em; text-transform: uppercase; color: #888; }
    #record {
      width: 120px; height: 120px; border-radius: 50%;
      border: 2px solid #444; background: #1a1a1e;
      color: #e8e8e8; font-family: inherit; font-size: 0.7rem;
      letter-spacing: 0.15em; text-transform: uppercase;
      cursor: pointer; transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      user-select: none;
    }
    #record:hover { border-color: #666; }
    #record.recording {
      border-color: #e05555; background: #2a1a1a;
      box-shadow: 0 0 24px rgba(220, 60, 60, 0.3);
    }
    #status {
      font-size: 0.72rem; letter-spacing: 0.2em;
      color: #555; text-transform: uppercase; min-height: 1.2em;
    }
  </style>
</head>
<body>
  <h1>Hello there User!</h1>
  <button id="record">Hold to<br>Talk</button>
  <div id="status">Connecting…</div>

<script>
  const btn    = document.getElementById("record");
  const status = document.getElementById("status");

  // Gemini expects 16 kHz PCM input and outputs 24 kHz PCM
  const RECORD_RATE   = 16000;
  const PLAYBACK_RATE = 24000;

  // Lookahead buffer: how far ahead we schedule audio relative to currentTime.
  // Larger = more protection against jitter, but slightly more latency before
  // the first sound. 150 ms is a good balance for LAN/localhost.
  const SCHEDULE_AHEAD_MS = 150;

  const recordCtx   = new AudioContext({ sampleRate: RECORD_RATE });
  const playbackCtx = new AudioContext({ sampleRate: PLAYBACK_RATE });

  // nextPlayAt tracks the AudioContext timestamp where the next chunk should
  // start. This is the key to gapless, jitter-free playback:
  //   - If we're behind (slow network), we clamp to currentTime + lookahead
  //   - If chunks arrive faster than real-time (Gemini bursts), they queue up
  //     perfectly end-to-end with no gap between them
  let nextPlayAt = 0;

  let ws, mediaRecorder, chunks = [];

  // ── WebSocket ────────────────────────────────────────────────────────────
  function connect() {
    ws = new WebSocket("ws://127.0.0.1:8000/ws");
    ws.binaryType = "arraybuffer";

    ws.onopen  = () => setStatus("ready");
    ws.onclose = () => { setStatus("disconnected"); setTimeout(connect, 2000); };
    ws.onerror = () => setStatus("error");

    ws.onmessage = ({ data }) => {
      // Each message is one raw PCM chunk from Gemini.
      // Schedule it immediately on the audio timeline — no queue, no waiting.
      schedulePCMChunk(data);
    };
  }

  // ── Recording ────────────────────────────────────────────────────────────
  async function initMic() {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: { channelCount: 1, sampleRate: RECORD_RATE }
    });
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = (e) => chunks.push(e.data);

    mediaRecorder.onstop = async () => {
      // Decode through a 16 kHz context so the browser resamples for us
      const blob = new Blob(chunks, { type: "audio/webm" });
      chunks = [];
      const decoded = await recordCtx.decodeAudioData(await blob.arrayBuffer());
      ws.send(toPCM16(decoded));
      setStatus("waiting…");
    };
  }

  // Float32 AudioBuffer → Int16 PCM buffer (mono, already at RECORD_RATE)
  function toPCM16(audioBuffer) {
    const samples = audioBuffer.getChannelData(0);
    const out = new Int16Array(samples.length);
    for (let i = 0; i < samples.length; i++) {
      const s = Math.max(-1, Math.min(1, samples[i]));
      out[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
    }
    return out.buffer;
  }

  // ── Gapless playback scheduler ───────────────────────────────────────────
  // Called once per incoming WebSocket message (one PCM chunk from Gemini).
  //
  // How it works:
  //   Gemini sends chunks faster than real-time — a 0.5 s response might
  //   arrive in 5 chunks over 80 ms. If we played each on arrival we'd hear
  //   5 blobs with gaps between them whenever the CPU or network hiccups.
  //
  //   Instead we maintain nextPlayAt: an absolute AudioContext timestamp.
  //   Each chunk is scheduled to start exactly when the previous one ends.
  //   The lookahead clamp (SCHEDULE_AHEAD_MS) ensures we never schedule in
  //   the past even if a chunk arrives late.
  //
  function schedulePCMChunk(arrayBuffer) {
    // Unpack Int16 → Float32
    const int16   = new Int16Array(arrayBuffer);
    const float32 = new Float32Array(int16.length);
    for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768;

    // Build an AudioBuffer at the playback sample rate
    const audioBuf = playbackCtx.createBuffer(1, float32.length, PLAYBACK_RATE);
    audioBuf.copyToChannel(float32, 0);

    // Clamp: never schedule in the past, always at least SCHEDULE_AHEAD_MS
    // ahead so the audio thread has time to prepare the buffer.
    const minStart = playbackCtx.currentTime + SCHEDULE_AHEAD_MS / 1000;
    const startAt  = Math.max(minStart, nextPlayAt);

    const src = playbackCtx.createBufferSource();
    src.buffer = audioBuf;
    src.connect(playbackCtx.destination);
    src.start(startAt);

    // Advance the pointer by exactly this chunk's duration
    nextPlayAt = startAt + audioBuf.duration;

    // Update status once playback actually begins (only for the first chunk)
    if (nextPlayAt - audioBuf.duration <= playbackCtx.currentTime + SCHEDULE_AHEAD_MS / 1000 + 0.01) {
      src.onended = () => {
        // If nothing else is queued, we're done
        if (nextPlayAt <= playbackCtx.currentTime + 0.05) setStatus("ready");
      };
    }
  }

  // ── Button ───────────────────────────────────────────────────────────────
  btn.onmousedown = () => {
    // Reset the play pointer so new response starts fresh (not appended to old)
    nextPlayAt = 0;
    chunks = [];
    mediaRecorder.start();
    btn.classList.add("recording");
    setStatus("recording…");
  };
  btn.onmouseup = () => {
    mediaRecorder.stop();
    btn.classList.remove("recording");
  };
  btn.ontouchstart = (e) => { e.preventDefault(); btn.onmousedown(); };
  btn.ontouchend   = (e) => { e.preventDefault(); btn.onmouseup(); };

  function setStatus(msg) { status.textContent = msg; }

  // Boot
  connect();
  initMic();
</script>
</body>
</html>
