<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8"/>
<title>DigiSapiens — Lisa Avatar</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f0f11;
    color:#e8e8e8;
    font-family:monospace;
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:24px;
    overflow:hidden;
}

h1{
    font-size:1.2rem;
    letter-spacing:.2em;
    color:#888;
}

/* AVATAR */
#avatar-container{
    position:relative;
    width:340px;
    height:340px;
    flex-shrink:0;
}

.layer{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:contain;
    user-select:none;
    pointer-events:none;
}

#face{
    transition: opacity 70ms linear;
}

/* BUTTON */
#record{
    width:100px;
    height:100px;
    border-radius:50%;
    border:2px solid #444;
    background:#1a1a1e;
    color:white;
    font-size:.85rem;
    font-weight:bold;
    cursor:pointer;
    transition:.2s;
    flex-shrink:0;
    outline:none;
}

#record.recording{
    border-color:#ff5555;
    box-shadow: 0 0 30px rgba(255,80,80,.35);
    background:#2a1a1a;
}

#status{
    color:#666;
    min-height:1.2rem;
    text-transform:uppercase;
    letter-spacing: 0.1em;
}

#latency{
    color:#777;
    font-size:.85rem;
    text-align:center;
    line-height:1.4;
}
</style>
</head>

<body>

<h1>DigiSapiens</h1>

<!-- AVATAR -->
<div id="avatar-container">
    <img class="layer" src="./assets/base.png">
    <img class="layer" id="face" src="./assets/face_idle.png">
</div>

<!-- BUTTON -->
<button id="record">
    HOLD TO TALK
</button>

<div id="status">
    connecting...
</div>

<div id="latency"></div>

<script>
const WS_URL = "ws://127.0.0.1:9000/ws";

/* DOM */
const btn = document.getElementById("record");
const statusEl = document.getElementById("status");
const latencyEl = document.getElementById("latency");
const face = document.getElementById("face");

/* FACE STATES */
const faces = {
    idle: "./assets/face_idle.png",
    blink: "./assets/face_blink.png",
    small: "./assets/face_talk_small.png",
    medium: "./assets/face_talk_medium.png",
    large: "./assets/face_talk_large.png"
};

function setFace(state){
    if(face.dataset.state === state)
        return;
    face.dataset.state = state;
    face.src = faces[state] || faces.idle;
}

/* BLINKING */
function blinkLoop(){
    const nextBlink = 2000 + Math.random() * 4000;
    setTimeout(()=>{
        const current = face.dataset.state || "idle";
        setFace("blink");
        setTimeout(()=>{
            setFace(current);
        },120);
        blinkLoop();
    },nextBlink);
}

/* AUDIO & WEBSOCKET STATE */
let ws;
let micStream;
let processor;
let micCtx;
let recordedFloatChunks = [];
const RECORD_RATE = 16000;

let playbackCtx = new AudioContext();
let nextPlayAt = 0;

/* ANALYSER */
const analyser = playbackCtx.createAnalyser();
analyser.fftSize = 256;
const timeData = new Uint8Array(analyser.fftSize);
let smoothVolume = 0;

function setStatus(t){
    statusEl.innerText = t;
}

function resetPlayback(){
    nextPlayAt = 0;
}

/* FACE ANIMATION */
let currentFace = "idle";
function animateFace(){
    analyser.getByteTimeDomainData(timeData);
    let sumSquares = 0;
    for(let i=0; i<timeData.length; i++){
        const v = (timeData[i] - 128) / 128;
        sumSquares += v * v;
    }
    const rms = Math.sqrt(sumSquares / timeData.length);
    const volume = rms * 45;
    smoothVolume = smoothVolume * 0.88 + volume * 0.12;

    let nextFace = "idle";
    if(smoothVolume < 1.2){
        nextFace = "idle";
    }else if(smoothVolume < 4.5){
        nextFace = "small";
    }else if(smoothVolume < 9){
        nextFace = "medium";
    }else{
        nextFace = "large";
    }

    if(nextFace !== currentFace){
        currentFace = nextFace;
        setFace(nextFace);
    }
    requestAnimationFrame(animateFace);
}

/* PLAY AUDIO FRAGMENTS */
async function playWavFragment(wavBytes){
    const arrayBuffer = wavBytes.buffer.slice(
        wavBytes.byteOffset,
        wavBytes.byteOffset + wavBytes.byteLength
    );

    const audioBuffer = await playbackCtx.decodeAudioData(arrayBuffer);
    const src = playbackCtx.createBufferSource();
    src.buffer = audioBuffer;

    src.connect(analyser);
    analyser.connect(playbackCtx.destination);

    const minStart = playbackCtx.currentTime + 0.05;
    const startAt = Math.max(minStart, nextPlayAt);

    src.start(startAt);
    nextPlayAt = startAt + audioBuffer.duration;

    src.onended = () => {
        if (nextPlayAt <= playbackCtx.currentTime + 0.08) {
            setStatus("ready");
            setFace("idle");
        }
    };
}

/* RECORDING FUNCTIONS */
async function startRecording() {
    if (playbackCtx.state === "suspended") await playbackCtx.resume();
    resetPlayback();
    latencyEl.innerHTML = "";
    recordedFloatChunks = [];
    setStatus("recording...");

    micStream = await navigator.mediaDevices.getUserMedia({
        audio: {
            channelCount: 1,
            sampleRate: RECORD_RATE,
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true,
        }
    });

    micCtx = new AudioContext({ sampleRate: RECORD_RATE });
    const src = micCtx.createMediaStreamSource(micStream);
    
    processor = micCtx.createScriptProcessor(4096, 1, 1);
    src.connect(processor);
    processor.connect(micCtx.destination);

    processor.onaudioprocess = (e) => {
        const float32 = e.inputBuffer.getChannelData(0);
        recordedFloatChunks.push(new Float32Array(float32));
    };
}

async function stopRecording() {
    setStatus("thinking...");
    
    // Stop recording and cleanup mic
    if (processor) { processor.disconnect(); processor = null; }
    if (micCtx) { await micCtx.close(); micCtx = null; }
    if (micStream) {
        micStream.getTracks().forEach(t => t.stop());
        micStream = null;
    }

    // Merge Float32 chunks
    let totalLength = 0;
    for (const chunk of recordedFloatChunks) {
        totalLength += chunk.length;
    }
    if (totalLength === 0) {
        setStatus("ready");
        return;
    }

    const mergedFloat32 = new Float32Array(totalLength);
    let offset = 0;
    for (const chunk of recordedFloatChunks) {
        mergedFloat32.set(chunk, offset);
        offset += chunk.length;
    }
    recordedFloatChunks = [];

    // Convert to PCM16
    const int16 = new Int16Array(mergedFloat32.length);
    for (let i = 0; i < mergedFloat32.length; i++) {
        const s = Math.max(-1, Math.min(1, mergedFloat32[i]));
        int16[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
    }

    // Send to WebSocket
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(int16.buffer);
    } else {
        setStatus("error: ws closed");
    }
}

/* WEBSOCKET CONNECTION */
function connectWS() {
    ws = new WebSocket(WS_URL);
    ws.binaryType = "arraybuffer";

    ws.onopen = () => {
        console.log("[ws] connected");
        setStatus("ready");
    };

    ws.onclose = () => {
        console.log("[ws] disconnected, reconnecting...");
        setStatus("reconnecting...");
        setTimeout(connectWS, 2000);
    };

    ws.onerror = (e) => {
        console.error("[ws] error:", e);
        setStatus("error");
    };

    ws.onmessage = async ({ data }) => {
        if (data instanceof ArrayBuffer) {
            if (playbackCtx.state === "suspended") await playbackCtx.resume();
            setStatus("speaking...");
            await playWavFragment(new Uint8Array(data));
        } else {
            try {
                const msg = JSON.parse(data);
                if (msg.type === "meta") {
                    latencyEl.innerHTML = `
                        llm: ${msg.llm_ms} ms<br>
                        user: "${msg.transcript}"
                    `;
                } else if (msg.type === "done") {
                    setTimeout(() => {
                        if (nextPlayAt <= playbackCtx.currentTime + 0.1) {
                            setStatus("ready");
                            setFace("idle");
                        }
                    }, 200);
                } else if (msg.type === "error") {
                    setStatus("pipeline error");
                }
            } catch (e) {
                // ignore parsing error
            }
        }
    };
}

/* BUTTON EVENTS */
btn.onmousedown = () => {
    btn.classList.add("recording");
    startRecording().catch(err => {
        console.error(err);
        setStatus("error starting mic");
    });
};

btn.onmouseup = () => {
    btn.classList.remove("recording");
    stopRecording().catch(err => {
        console.error(err);
        setStatus("error stopping mic");
    });
};

btn.ontouchstart = (e) => {
    e.preventDefault();
    btn.onmousedown();
};

btn.ontouchend = (e) => {
    e.preventDefault();
    btn.onmouseup();
};

/* INITIALIZE */
setFace("idle");
blinkLoop();
animateFace();
connectWS();

</script>
</body>
</html>
