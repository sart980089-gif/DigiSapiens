<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8"/>

<title>DigiSapiens</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#0f0f11;
    color:#e8e8e8;

    font-family:monospace;

    height:100vh;

    display:flex;
    flex-direction:column;

    align-items:center;
    justify-content:center;

    gap:24px;

    overflow:hidden;
}

h1{

    font-size:1.2rem;

    letter-spacing:.2em;

    color:#888;
}

/*
    AVATAR
*/

#avatar-container{

    position:relative;

    width:340px;
    height:340px;

    flex-shrink:0;
}

.layer{

    position:absolute;

    width:100%;
    height:100%;

    object-fit:contain;

    user-select:none;

    pointer-events:none;
}

#face{

    transition:
        opacity 70ms linear;
}

/*
    BUTTON
*/

#record{

    width:130px;
    height:130px;

    border-radius:50%;

    border:2px solid #444;

    background:#1a1a1e;

    color:white;

    font-size:.85rem;

    cursor:pointer;

    transition:.2s;

    flex-shrink:0;
}

#record.active{

    border-color:#55ff88;

    box-shadow:
        0 0 35px
        rgba(80,255,120,.25);

    background:#132018;
}

#status{

    color:#666;

    min-height:1.2rem;
}

#latency{

    color:#777;

    font-size:.85rem;

    text-align:center;
}

</style>

</head>

<body>

<h1>DigiSapiens</h1>

<div id="avatar-container">

    <img
        class="layer"
        src="./assets/base.png"
    >

    <img
        class="layer"
        id="face"
        src="./assets/face_idle.png"
    >

</div>

<button id="record">
    Start Conversation
</button>

<div id="status">
    idle
</div>

<div id="latency"></div>

<!-- vad-web bundles onnxruntime + silero model path, no manual ONNX needed -->
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.14.0/dist/ort.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.19/dist/bundle.min.js"></script>

<script>

const SERVER =
    "http://127.0.0.1:9000"

/*
    DOM
*/

const btn =
    document.getElementById("record")

const statusEl =
    document.getElementById("status")

const latencyEl =
    document.getElementById("latency")

const face =
    document.getElementById("face")

/*
    STATES
*/

let conversationMode = false

let isProcessing = false

/*
    FACE STATES
*/

const faces = {

    idle:
        "./assets/base.png",

    blink:
        "./assets/face_blink.png",

    small:
        "./assets/face_talk_small.png",

    medium:
        "./assets/face_talk_medium.png"
}

function setFace(state){

    if(face.dataset.state === state)
        return

    face.dataset.state = state

    face.src = faces[state]
}

/*
    AUDIO
*/

let playbackCtx =
    new AudioContext()

let nextPlayAt = 0

let micCtx

/*
    PLAYBACK ANALYSER
    (drives face animation when Lisa speaks)
*/

const analyser =
    playbackCtx.createAnalyser()

analyser.fftSize = 256

const timeData =
    new Uint8Array(
        analyser.fftSize
    )

let smoothVolume = 0

/*
    STATUS
*/

function setStatus(t){

    statusEl.innerText = t
}

function resetPlayback(){

    nextPlayAt = 0
}

/*
    BLINKING
*/

function blinkLoop(){

    const nextBlink =
        2000 + Math.random() * 4000

    setTimeout(()=>{

        const current =
            face.dataset.state || "idle"

        setFace("blink")

        setTimeout(()=>{

            setFace(current)

        },120)

        blinkLoop()

    },nextBlink)
}

/*
    FACE ANIMATION
    driven by playback analyser (Lisa speaking)
*/

let currentFace = "idle"

let speaking = false

let speechHoldUntil = 0

function animateFace(){

    analyser.getByteTimeDomainData(
        timeData
    )

    let sumSquares = 0

    for(
        let i=0;
        i<timeData.length;
        i++
    ){

        const v =
            (timeData[i] - 128)
            / 128

        sumSquares += v * v
    }

    const rms = Math.sqrt(
        sumSquares
        / timeData.length
    )

    const volume =
        rms * 45

    smoothVolume =
        smoothVolume * 0.92 +
        volume * 0.08

    if(smoothVolume > 1.2){

        speaking = true

        speechHoldUntil =
            performance.now() + 120
    }

    if(
        performance.now()
        > speechHoldUntil
    ){

        speaking = false
    }

    let nextFace = "idle"

    if(speaking){

        if(smoothVolume < 5.5){

            nextFace = "small"

        }else{

            nextFace = "medium"
        }
    }

    if(nextFace !== currentFace){

        currentFace = nextFace

        setFace(nextFace)
    }

    requestAnimationFrame(
        animateFace
    )
}

/*
    =============================================
    SILERO VAD  via @ricky0123/vad-web
    =============================================

    vad-web wraps Silero VAD + ONNX runtime into
    a single high-level MicVAD API. It handles:
    - correct model URL
    - WASM single-thread mode (no COOP/COEP needed)
    - 16kHz resampling internally
    - speech start / end callbacks

    onSpeechEnd receives a Float32Array of the
    full utterance at 16kHz — we re-encode it
    as WAV and send it to the server, replacing
    the separate MediaRecorder entirely.
    =============================================
*/

let myvad = null

/*
    float32 PCM @ 16kHz → WAV Blob
*/

function float32ToWav(samples, sampleRate){

    const buf    = new ArrayBuffer(44 + samples.length * 2)
    const view   = new DataView(buf)
    const write  = (o, s) => { for(let i=0;i<s.length;i++) view.setUint8(o+i, s.charCodeAt(i)) }

    write(0,  "RIFF")
    view.setUint32(4,  36 + samples.length * 2, true)
    write(8,  "WAVE")
    write(12, "fmt ")
    view.setUint32(16, 16,         true)   // PCM chunk size
    view.setUint16(20, 1,          true)   // PCM format
    view.setUint16(22, 1,          true)   // mono
    view.setUint32(24, sampleRate, true)
    view.setUint32(28, sampleRate * 2, true)
    view.setUint16(32, 2,          true)   // block align
    view.setUint16(34, 16,         true)   // bits per sample
    write(36, "data")
    view.setUint32(40, samples.length * 2, true)

    // float32 → int16
    let offset = 44
    for(let i = 0; i < samples.length; i++){
        const s = Math.max(-1, Math.min(1, samples[i]))
        view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true)
        offset += 2
    }

    return new Blob([buf], { type: "audio/wav" })
}

/*
    MIC INIT — uses vad-web MicVAD instead of
    MediaRecorder + manual RMS loop
*/

async function initMic(){

    /*
        Configure ONNX runtime directly on the global
        before MicVAD.new() — ortConfig callback is
        unreliable across vad-web versions.
    */
    ort.env.wasm.numThreads = 1
    ort.env.wasm.wasmPaths  =
        "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.14.0/dist/"

    myvad = await vad.MicVAD.new({

        workletURL:
            "https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.19/dist/vad.worklet.bundle.min.js",

        modelURL:
            "https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.19/dist/silero_vad.onnx",

        /*
            Tuning knobs
        */
        positiveSpeechThreshold: 0.85,
        negativeSpeechThreshold: 0.5,
        minSpeechFrames:         8,      // ~160ms minimum
        redemptionFrames:        16,     // ~320ms silence before end

        onSpeechStart(){

            if(!conversationMode || isProcessing) return

            console.log("vad: speech start")

            setStatus("listening...")
        },

        onSpeechEnd(audio){

            if(!conversationMode || isProcessing) return

            console.log(
                `vad: speech end, ${audio.length} samples`
            )

            /*
                audio is Float32Array @ 16kHz.
                Convert to WAV and ship to server.
            */

            const wavBlob = float32ToWav(audio, 16000)

            sendAudio(wavBlob)
        },

        onVADMisfire(){

            console.log("vad: misfire (too short)")
        },
    })

    console.log("silero vad ready")
}

/*
    VAD active flag — controls whether
    onSpeechEnd fires the pipeline
*/

let vadActive = false

/*
    START / STOP VAD
    vad-web handles recording internally.
    We just tell it to start/stop listening.
*/

function startListening(){

    if(isProcessing || !myvad) return

    vadActive = true

    myvad.start()

    setStatus("listening...")
}

function stopListening(){

    vadActive = false

    if(myvad) myvad.pause()
}

/*
    SEND AUDIO TO SERVER
    Called by onSpeechEnd with a WAV Blob.
*/

async function sendAudio(wavBlob){

    if(!conversationMode) return

    try{

        isProcessing = true

        // pause VAD while processing
        if(myvad) myvad.pause()

        setStatus("thinking...")

        latencyEl.innerHTML = ""

        resetPlayback()

        const formData = new FormData()

        formData.append(
            "file",
            wavBlob,
            "audio.wav"
        )

        const responsePromise =
            fetch(
                `${SERVER}/voice`,
                { method:"POST", body:formData }
            )

        const uploadFinishedAt =
            performance.now()

        const response =
            await responsePromise

        if(!response.ok){

            setStatus("pipeline error")

            isProcessing = false

            return
        }

        const llmLatency =
            response.headers.get(
                "X-LLM-Latency"
            ) || "?"

        const reader =
            response.body.getReader()

        let buffer =
            new Uint8Array()

        let firstAudio = true

        setStatus("speaking...")

        while(true){

            const {done,value} =
                await reader.read()

            if(done) break

            if(!value) continue

            if(firstAudio){

                firstAudio = false

                const latency =
                    performance.now()
                    - uploadFinishedAt

                latencyEl.innerHTML =
                    `upload → first audio: ${Math.round(latency)} ms`
                    + `<br>llm: ${llmLatency} ms`
            }

            const merged =
                new Uint8Array(
                    buffer.length + value.length
                )

            merged.set(buffer)

            merged.set(value, buffer.length)

            buffer = merged

            while(true){

                if(buffer.length < 12) break

                let riffIndex = -1

                for(
                    let i=0;
                    i<buffer.length-4;
                    i++
                ){

                    if(
                        buffer[i]   === 82 &&
                        buffer[i+1] === 73 &&
                        buffer[i+2] === 70 &&
                        buffer[i+3] === 70
                    ){

                        riffIndex = i
                        break
                    }
                }

                if(riffIndex === -1){
                    buffer = new Uint8Array()
                    break
                }

                if(riffIndex > 0)
                    buffer = buffer.slice(riffIndex)

                if(buffer.length < 8) break

                const wavSize =
                    buffer[4]
                    | (buffer[5] << 8)
                    | (buffer[6] << 16)
                    | (buffer[7] << 24)

                const totalSize = wavSize + 8

                if(buffer.length < totalSize) break

                const wavFragment =
                    buffer.slice(0, totalSize)

                buffer =
                    buffer.slice(totalSize)

                await playWavFragment(wavFragment)
            }
        }

        isProcessing = false

        if(conversationMode){

            setStatus("listening...")

            myvad.start()
        }

    }catch(err){

        console.error(err)

        setStatus("error")

        isProcessing = false
    }
}

/*
    PLAY AUDIO
*/

async function playWavFragment(wavBytes){

    const arrayBuffer =
        wavBytes.buffer.slice(
            wavBytes.byteOffset,
            wavBytes.byteOffset + wavBytes.byteLength
        )

    const audioBuffer =
        await playbackCtx
        .decodeAudioData(arrayBuffer)

    const src =
        playbackCtx.createBufferSource()

    src.buffer = audioBuffer

    src.connect(analyser)

    analyser.connect(
        playbackCtx.destination
    )

    const minStart =
        playbackCtx.currentTime + 0.05

    const startAt =
        Math.max(minStart, nextPlayAt)

    src.start(startAt)

    nextPlayAt =
        startAt + audioBuffer.duration
}

/*
    CONVERSATION MODE
*/

btn.onclick = ()=>{

    conversationMode = !conversationMode

    if(conversationMode){

        btn.classList.add("active")

        btn.innerText = "Stop Conversation"

        startListening()

    }else{

        btn.classList.remove("active")

        btn.innerText = "Start Conversation"

        setStatus("idle")

        stopListening()
    }
}

/*
    START
*/

setFace("idle")

blinkLoop()

animateFace()

// Load Silero VAD, then init mic
initMic()
    .then(() => {
        console.log("ready")
        setStatus("idle")
    })
    .catch(err => {
        console.error("vad init failed:", err)
        setStatus("vad load failed — check console")
    })

</script>

</body>

</html>
